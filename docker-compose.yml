services:

  solr:
    image: solr:latest
    container_name: solr_nomologia
    ports:
      - "8983:8983"
    volumes:
      - ./solr/solr_data:/var/solr
    command:
      - solr-precreate
      - nomologia
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/nomologia/admin/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caselaw_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./pdf:/app/pdf
      - ./Dataset:/app/Dataset:ro
    command: uvicorn clapi:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
    depends_on:
      solr:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./caselaw
      dockerfile: Dockerfile
    container_name: caselaw_frontend
    ports:
      - "3000:3000"
    env_file:
      - ./caselaw/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend